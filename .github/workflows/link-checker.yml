name: Link Checker

on:
  pull_request:
  schedule:
    - cron: '0 2 * * *'

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lychee
        run: |
          curl -fsSL https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz | tar -xz --strip-components=1 lychee-x86_64-unknown-linux-gnu/lychee
          sudo mv lychee /usr/local/bin/
          lychee --version

      - name: Check links
        run: lychee --no-progress --exclude 'http://localhost' '**/*.ts' '**/*.tsx' '**/*.mdx'

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'schedule'
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            -d '{"text": "🔴 Dead links detected in nightly link check. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"}'
